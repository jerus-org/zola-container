version: 2.1

# Triggered manually via CircleCI UI or API (configured in CircleCI project
# settings under "Triggers"). Runs independently of the push-triggered config.yml.
#
# Two independent versions are managed:
#   WORKSPACE_VERSION - nextsv v* calculation; increments for any workspace change
#                       (CI improvements, toolkit bumps, etc.)
#   ZOLA_VERSION      - derived from Dockerfile ENV ZOLA_VERSION= (Renovate-managed);
#                       only changes when the zola tool itself is updated
#
# Workflow:
#   calculate-versions  - compute both versions; query DockerHub to auto-detect whether
#                         jerusdp/ci-zola:<ZOLA_VERSION> needs publishing; print report
#   approve-release     - manual gate: reviewer confirms versions before proceeding
#   toolkit/release_prlog - create workspace v* git release and update PRLOG.md
#   docker/publish      - build and push jerusdp/ci-zola:<ZOLA_VERSION>;
#                         skipped automatically if the image already exists on DockerHub

parameters:
  workspace_version:
    type: string
    default: ""
    description: "Override workspace v* version (empty = nextsv auto-detect)"

orbs:
  toolkit: jerus-org/circleci-toolkit@6.0.0
  docker: circleci/docker@3.0.1

jobs:
  calculate_versions:
    executor:
      name: toolkit/rust_env_rolling

    steps:
      - checkout
      - run:
          name: Calculate release versions
          command: |
            set -eo pipefail

            echo "nextsv version: $(nextsv --version)"
            echo ""

            mkdir -p /tmp/release-versions
            VERSIONS_FILE="/tmp/release-versions/versions.env"
            > "$VERSIONS_FILE"

            # Workspace version via nextsv (or manual override)
            if [ "<< pipeline.parameters.workspace_version >>" != "" ]; then
              WORKSPACE_VERSION="<< pipeline.parameters.workspace_version >>"
              echo "workspace: using specified version: $WORKSPACE_VERSION"
            else
              echo "workspace: running: nextsv -bn calculate --prefix v"
              nextsv_exit=0
              nextsv -bn calculate --prefix v \
                > /tmp/nextsv-stdout.txt \
                2> /tmp/nextsv-stderr.txt \
                || nextsv_exit=$?
              if [ -s /tmp/nextsv-stderr.txt ]; then
                echo "workspace: nextsv stderr:"
                cat /tmp/nextsv-stderr.txt
              fi
              WORKSPACE_VERSION=$(cat /tmp/nextsv-stdout.txt)
              [ -z "$WORKSPACE_VERSION" ] && WORKSPACE_VERSION="none"
              echo "workspace: exit=${nextsv_exit} calculated version: $WORKSPACE_VERSION"
              if [ "$nextsv_exit" -ne 0 ]; then
                echo "ERROR: nextsv failed for workspace version (exit=${nextsv_exit})"
                exit "$nextsv_exit"
              fi
            fi
            echo "WORKSPACE_VERSION=${WORKSPACE_VERSION}" >> "$VERSIONS_FILE"

            # Zola version from Dockerfile (Renovate-managed ENV line)
            ZOLA_VERSION=$(grep 'ENV ZOLA_VERSION=' Dockerfile | cut -d= -f2)
            echo "zola: version from Dockerfile: $ZOLA_VERSION"
            echo "ZOLA_VERSION=${ZOLA_VERSION}" >> "$VERSIONS_FILE"

            # Auto-detect whether Docker image needs publishing
            echo "zola: checking DockerHub for jerusdp/ci-zola:${ZOLA_VERSION} ..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://hub.docker.com/v2/repositories/jerusdp/ci-zola/tags/${ZOLA_VERSION}/")
            if [ "$HTTP_CODE" = "200" ]; then
              PUBLISH_DOCKER=false
              echo "zola: image already exists on DockerHub — Docker publish will be skipped"
            else
              PUBLISH_DOCKER=true
              echo "zola: image not found on DockerHub (HTTP ${HTTP_CODE}) — Docker publish will run"
            fi
            echo "PUBLISH_DOCKER=${PUBLISH_DOCKER}" >> "$VERSIONS_FILE"

            # Report card — visible before approval
            echo ""
            echo "======================================="
            echo "  Versions pending release approval"
            echo "======================================="
            printf "  %-32s %s\n" "workspace (v*)" "${WORKSPACE_VERSION}"
            if [ "$PUBLISH_DOCKER" = "true" ]; then
              printf "  %-32s %s  [NEW — will publish]\n" "zola Docker image" "${ZOLA_VERSION}"
            else
              printf "  %-32s %s  [already published — skip]\n" "zola Docker image" "${ZOLA_VERSION}"
            fi
            echo "======================================="
            echo ""
            echo "--- versions.env ---"
            cat "$VERSIONS_FILE"
      - persist_to_workspace:
          root: /tmp/release-versions
          paths:
            - versions.env

workflows:
  release:
    jobs:
      - calculate_versions:
          name: calculate-versions

      - approve-release:
          type: approval
          requires: [calculate-versions]

      - toolkit/release_prlog:
          requires: [approve-release]
          context:
            - release
            - bot-check
            - pcu-app

      - docker/publish:
          pre-steps:
            - attach_workspace:
                at: /tmp/release-versions
            - run:
                name: Load versions and check if Docker publish is needed
                command: |
                  source /tmp/release-versions/versions.env
                  if [ "${PUBLISH_DOCKER}" = "false" ]; then
                    echo "Image jerusdp/ci-zola:${ZOLA_VERSION} already exists — skipping Docker publish"
                    circleci-agent step halt
                  fi
                  echo "Publishing jerusdp/ci-zola:${ZOLA_VERSION}"
                  echo "export ZOLA_VERSION=${ZOLA_VERSION}" >> "$BASH_ENV"
          image: jerusdp/ci-zola
          tag: ${ZOLA_VERSION}
          extra_build_args: --target final
          docker-username: DOCKERHUB_USERNAME
          docker-password: DOCKERHUB_PASSWORD
          requires: [toolkit/release_prlog]
          context:
            - docker
